<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugando en el Espacio - Programación de Videojuegos 1</title>
    <link rel="icon" type="image/png" href="assets/Nave322.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- PixiJS v8 desde CDN -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
    <!-- Firebase SDK (versión compatible que funciona sin módulos) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-overlay">
        <!-- Panel izquierdo: Score, Oleada y Ulti -->
         <!-- Imagen decorativa debajo -->
        <img id="ship-icon" src="assets/puntuacion2.png" alt="Puntuación">
        <div id="left-panel">
            <div id="score">Puntuación: 0</div>
            <div id="wave">Oleada: 0 | Faltan: 10</div>
            <div id="escudos-container">
                <img id="escudos-icon" src="assets/escudo1.png" alt="Escudos">
                <div id="escudos-bar-bg">
                    <div id="escudos-bar-fill"></div>
                </div>
            </div>
            <div id="ulti-container">
                <img id="ulti-icon" src="assets/ultiicon1.png" alt="ULTi">
                <div id="ulti-bar-bg">
                    <div id="ulti-bar-fill"></div>
                </div>
            </div>
            <div id="aceleracion-container">
                <img id="aceleracion-icon" src="assets/aceleracion1.png" alt="Aceleración">
                <div id="aceleracion-bar-bg">
                    <div id="aceleracion-bar-fill"></div>
                </div>
            </div>
        </div>
        <div id="controls">
            <img id="tutorial-icon" src="assets/tutorial.png" alt="Tutorial">
            <div id="tutorial-text">
                <div>W: Avanzar | Espacio: Disparar | A/D: Rotar | S: Ulti</div>
            </div>
        </div>
        <!-- Versión en esquina inferior derecha -->
        <div id="version-display">v1.3.4</div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
